<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NeuroLink Experience</title>

<style>

body{
margin:0;
font-family:Courier New, monospace;
background:black;
color:#00ff88;
overflow-x:hidden;
}

/* fond binaire */

.binary{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
opacity:0.15;
font-size:14px;
line-height:14px;
white-space:pre;
color:#00ff88;
}

/* interface */

header{
text-align:center;
padding:30px;
font-size:28px;
letter-spacing:4px;
border-bottom:1px solid #00ff88;
}

.container{
padding:40px;
max-width:900px;
margin:auto;
}

button{
background:black;
color:#00ff88;
border:1px solid #00ff88;
padding:10px 18px;
margin:8px;
cursor:pointer;
font-family:inherit;
}

button:hover{
background:#00ff88;
color:black;
}

.section{
margin-top:40px;
}

input, select{
background:black;
border:1px solid #00ff88;
color:#00ff88;
padding:10px;
margin:5px;
font-family:inherit;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="binary" id="binary"></div>

<header>
NEUROLINK EXPERIENCE
</header>

<div class="container">

<div class="section">

<h3>Device Status</h3>
<p id="status">Chip: disconnected</p>

<button onclick="connect()">Connect Device</button>

</div>

<div class="section hidden" id="mode">

<h3>Select Mode</h3>

<button onclick="solo()">Solo Experience</button>
<button onclick="multi()">Multi Player</button>

</div>

<div class="section hidden" id="solo">

<h3>Scenario Catalog</h3>

<input type="text" placeholder="Search scenario...">

<br><br>

<label>Mood</label>
<select>
<option>Relax</option>
<option>Intense</option>
<option>Dream</option>
<option>Mystery</option>
</select>

<label>Time</label>
<select>
<option>Day</option>
<option>Night</option>
</select>

<label>Intensity</label>
<select>
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<br><br>

<button onclick="download()">Download Scenario</button>

</div>

<div class="section hidden" id="multi">

<h3>Join Session</h3>

<input placeholder="Enter session code">

<button>Join</button>

<h3>Create Session</h3>

<button>Create Multiplayer Room</button>

</div>

<div class="section">

<h3>Top Experiences</h3>

<ol>
<li>Dreamscape</li>
<li>Neon Pulse</li>
<li>Ocean Drift</li>
<li>Illusion</li>
<li>Titanic beta</li>
</ol>

</div>

</div>

<script>

/* connexion puce */

function connect(){
document.getElementById("status").innerHTML =
"Chip: connected | Neural signal stable | Sync OK";
document.getElementById("mode").classList.remove("hidden");
}

function solo(){
document.getElementById("solo").classList.remove("hidden");
document.getElementById("multi").classList.add("hidden");
}

function multi(){
document.getElementById("multi").classList.remove("hidden");
document.getElementById("solo").classList.add("hidden");
}

function download(){
alert("Uploading neural pattern to chip...");
}

/* génération fond binaire */

let binary = document.getElementById("binary");
let text = "";

for(let i=0;i<4000;i++){
text += Math.random() > 0.5 ? "1":"0";

if(i%120===0) text += "\n";
}

binary.innerText = text;

</script>

</body>
</html>
